<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qahwa BLK</title>
<style>
  :root {
    --bg: #0b0b0c;
    --card: #17140f;
    --text: #f5f1ea;
    --muted: #a89f8f;
    --gold: #c9a24a;
    --careem: #00E784;
    --careem-text: #00493E;
    --talabat: #ff5900;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    background: radial-gradient(circle at 50% 0%, #1a1712 0%, #0b0b0c 60%);
  }
  .card {
    width: 100%;
    max-width: 420px;
    text-align: center;
  }
  .logo {
    width: 128px;
    height: 128px;
    margin: 0 auto 22px;
    display: block;
    border-radius: 18px;
    object-fit: cover;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
  }
  p.tag {
    color: var(--muted);
    margin: 0 0 40px;
    font-size: 0.95rem;
    letter-spacing: 0.03em;
  }
  .buttons {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 88px;
    border-radius: 16px;
    text-decoration: none;
    transition: transform 0.15s ease, filter 0.15s ease;
    border: 1px solid rgba(255,255,255,0.06);
    overflow: hidden;
  }
  .btn:active { transform: scale(0.98); }
  .btn:hover { filter: brightness(1.06); }
  .btn-careem { background: var(--careem); }
  .btn-talabat { background: #ffffff; }
  .btn img {
    max-height: 100%;
    max-width: 100%;
    object-fit: contain;
  }
  .btn-careem img { height: 58px; }
  .btn-talabat img { height: 68px; }
  footer {
    margin-top: 44px;
    color: #55503f;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="assets/blk-logo.jpg" alt="Qahwa BLK">
    <p class="tag">Order online — pick your app</p>
    <div class="buttons">
      <a class="btn btn-careem" id="btn-careem" data-platform="careem"
         href="https://link.careem.com/DOvIkH8AWEl01" rel="noopener" aria-label="Order on Careem">
        <img src="assets/careem.svg" alt="Careem">
      </a>
      <a class="btn btn-talabat" id="btn-talabat" data-platform="talabat"
         href="https://www.talabat.com/jordan/qahwa-blk" rel="noopener" aria-label="Order on Talabat">
        <img src="assets/talabat.jpg" alt="Talabat">
      </a>
    </div>
    <footer>Qahwa BLK</footer>
  </div>

<script>
  var SUPABASE_URL = "https://cblkzkryeuiixqywxofv.supabase.co";
  var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNibGt6a3J5ZXVpaXhxeXd4b2Z2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0NTI3OTAsImV4cCI6MjEwMDAyODc5MH0.FLHzAdhCD_6I1CpZEIJ8A0ieQ48kC8e8I0sTkeCoVBs";

  function logClick(platform) {
    try {
      fetch(SUPABASE_URL + "/rest/v1/clicks", {
        method: "POST",
        keepalive: true,
        headers: {
          "Content-Type": "application/json",
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": "Bearer " + SUPABASE_ANON_KEY,
          "Prefer": "return=minimal"
        },
        body: JSON.stringify({ platform: platform })
      });
    } catch (e) { /* ignore logging failures, never block navigation */ }
  }

  document.querySelectorAll("[data-platform]").forEach(function (el) {
    el.addEventListener("click", function () {
      logClick(el.getAttribute("data-platform"));
    });
  });
</script>
</body>
</html>
